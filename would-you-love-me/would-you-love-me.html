<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would you love me?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fdf3ec;
    --blush:#f6d6d9;
    --rose:#e88ca0;
    --deep-rose:#c85c78;
    --plum:#5a3346;
    --ink:#4a2e39;
    --gold:#e0a45e;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 20% 20%, #fbe4dd 0%, transparent 45%),
      radial-gradient(circle at 80% 75%, #f3d3de 0%, transparent 50%),
      var(--cream);
    font-family: 'Fraunces', serif;
    color: var(--ink);
    overflow:hidden;
  }

  #hearts{
    position:fixed; inset:0; pointer-events:none; z-index:1;
  }
  #hearts span{
    position:absolute;
    bottom:-10%;
    font-size: 18px;
    color: var(--rose);
    opacity:0.35;
    animation: float linear infinite;
  }
  @keyframes float{
    to{ transform: translateY(-120vh) rotate(20deg); }
  }

  .stage{
    position:relative;
    z-index:2;
    height:100%;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .card{
    position:relative;
    background: rgba(255,252,248,0.72);
    border:1px solid rgba(200,92,120,0.25);
    border-radius: 28px;
    padding: 56px 48px 64px;
    max-width: 560px;
    width:100%;
    text-align:center;
    backdrop-filter: blur(6px);
    box-shadow: 0 30px 60px -25px rgba(90,51,70,0.35);
  }

  .eyebrow{
    font-family:'Caveat', cursive;
    font-size: 22px;
    color: var(--deep-rose);
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }

  h1{
    font-size: clamp(34px, 6vw, 52px);
    font-weight: 600;
    font-style: italic;
    margin: 0 0 40px;
    color: var(--plum);
    line-height:1.15;
  }

  .btn-row{
    position: relative;
    display:flex;
    gap: 22px;
    justify-content:center;
    align-items:center;
    min-height: 68px;
  }

  button{
    font-family:'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    padding: 16px 34px;
    border-radius: 999px;
    border: none;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #yes{
    background: var(--deep-rose);
    color: #fff8f4;
    box-shadow: 0 12px 24px -10px rgba(200,92,120,0.6);
  }
  #yes:hover{ transform: translateY(-2px) scale(1.04); }
  #yes:active{ transform: scale(0.97); }

  #no{
    background: transparent;
    color: var(--plum);
    border: 1.5px solid rgba(90,51,70,0.35);
    position: relative;
    left: 0;
    top: 0;
    transition: transform 0.12s ease-out, left 0.12s ease-out, top 0.12s ease-out;
    z-index: 3;
    white-space: nowrap;
  }

  .hint{
    margin-top: 26px;
    font-family:'Caveat', cursive;
    font-size: 18px;
    color: var(--deep-rose);
    opacity: 0.75;
    min-height: 22px;
  }

  .reveal{
    display:none;
    position:relative;
  }
  .reveal.show{ display:block; animation: pop 0.5s cubic-bezier(.2,1.4,.4,1); }
  @keyframes pop{
    0%{ transform: scale(0.6); opacity:0; }
    100%{ transform: scale(1); opacity:1; }
  }

  .reveal h1{
    margin-bottom: 10px;
  }
  .reveal p{
    font-family:'Caveat', cursive;
    font-size: 24px;
    color: var(--deep-rose);
    margin: 0;
  }

  .question.hide{ display:none; }

  #burst{
    position:fixed; inset:0; pointer-events:none; z-index:5;
  }
  #burst span{
    position:absolute;
    font-size: 22px;
    opacity:0;
    animation: burst 1.1s ease-out forwards;
  }
  @keyframes burst{
    0%{ transform: translate(0,0) scale(0.4); opacity:1; }
    100%{ transform: var(--tx) scale(1.1); opacity:0; }
  }

  @media (max-width: 480px){
    .card{ padding: 40px 26px 52px; }
  }
</style>
</head>
<body>

<div id="hearts"></div>
<div id="burst"></div>

<div class="stage">
  <div class="card">

    <div class="question" id="question">
      <p class="eyebrow">just a small question</p>
      <h1>Would you love me?</h1>
      <div class="btn-row" id="btnRow">
        <button id="yes">Yes</button>
        <button id="no">No</button>
      </div>
      <p class="hint" id="hint">&nbsp;</p>
    </div>

    <div class="reveal" id="reveal">
      <p class="eyebrow">told you so</p>
      <h1>I knew it&hellip;</h1>
      <p>some things you just don't need to ask twice.</p>
    </div>

  </div>
</div>

<script>
  const heartsWrap = document.getElementById('hearts');
  for(let i=0;i<22;i++){
    const s = document.createElement('span');
    s.textContent = '♥';
    s.style.left = Math.random()*100 + '%';
    s.style.fontSize = (12 + Math.random()*16) + 'px';
    s.style.animationDuration = (10 + Math.random()*12) + 's';
    s.style.animationDelay = (Math.random()*10) + 's';
    heartsWrap.appendChild(s);
  }

  const noBtn = document.getElementById('no');
  const yesBtn = document.getElementById('yes');
  const btnRow = document.getElementById('btnRow');
  const hint = document.getElementById('hint');
  const question = document.getElementById('question');
  const reveal = document.getElementById('reveal');

  const hints = [
    "nice try.",
    "not so fast.",
    "you'll have to be quicker than that.",
    "keep trying, I don't mind.",
    "almost had it."
  ];
  let hintIndex = 0;
  let dodgeCount = 0;

  let noX = 0, noY = 0;
  let cardRect;

  function getCardRect(){
    return document.querySelector('.card').getBoundingClientRect();
  }

  function dodge(clientX, clientY){
    cardRect = getCardRect();
    const btnRect = noBtn.getBoundingClientRect();

    const cx = btnRect.left + btnRect.width/2;
    const cy = btnRect.top + btnRect.height/2;

    let dx = cx - clientX;
    let dy = cy - clientY;
    const dist = Math.hypot(dx, dy) || 1;
    dx /= dist; dy /= dist;

    const jitter = (Math.random() - 0.5) * 0.9;
    dx += jitter; dy += jitter * 0.6;

    const travel = 90 + Math.random()*70;
    let newLeft = noX + dx * travel;
    let newTop = noY + dy * travel;

    const maxX = cardRect.width/2 - 60;
    const maxY = 110;
    newLeft = Math.max(-maxX, Math.min(maxX, newLeft));
    newTop = Math.max(-maxY, Math.min(maxY, newTop));

    noX = newLeft;
    noY = newTop;

    noBtn.style.left = noX + 'px';
    noBtn.style.top = noY + 'px';

    dodgeCount++;
    hint.textContent = hints[Math.min(dodgeCount-1, hints.length-1)];
  }

  function proximityCheck(e){
    const r = noBtn.getBoundingClientRect();
    const cx = r.left + r.width/2;
    const cy = r.top + r.height/2;
    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
    if(dist < 90){
      dodge(e.clientX, e.clientY);
    }
  }

  document.addEventListener('mousemove', proximityCheck);
  noBtn.addEventListener('touchstart', (e)=>{
    const t = e.touches[0];
    dodge(t.clientX, t.clientY);
  }, {passive:true});

  function burstHearts(){
    const burst = document.getElementById('burst');
    const cx = window.innerWidth/2;
    const cy = window.innerHeight/2;
    for(let i=0;i<26;i++){
      const s = document.createElement('span');
      s.textContent = '♥';
      const angle = Math.random()*Math.PI*2;
      const dist = 120 + Math.random()*220;
      const tx = Math.cos(angle)*dist;
      const ty = Math.sin(angle)*dist;
      s.style.setProperty('--tx', `translate(${tx}px, ${ty}px)`);
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.color = Math.random() > 0.5 ? '#c85c78' : '#e0a45e';
      s.style.animationDelay = (Math.random()*0.15) + 's';
      burst.appendChild(s);
      setTimeout(()=>s.remove(), 1400);
    }
  }

  yesBtn.addEventListener('click', ()=>{
    question.classList.add('hide');
    reveal.classList.add('show');
    burstHearts();
  });
</script>

</body>
</html>
